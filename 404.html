<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>404 - Sequence Not Found | Stackly Biotech</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
   

    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --accent: #0d7ea6;
            --accent-glow: #62d8e8;
            --glass: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.08);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        /* Grid background */
        .grid-bg {
            position: absolute; inset: 0; z-index: 0; pointer-events: none;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Abstract glowing core */
        .core { position: absolute; left: 50%; top: 50%; width: 600px; height: 600px; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle, rgba(13,126,166,0.15), transparent 70%); filter: blur(40px); z-index: 1; animation: breathe 8s ease-in-out infinite alternate; pointer-events: none; }
        @keyframes breathe { 0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } }

        .oops-container {
            z-index: 10;
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 80px 60px;
            border-radius: 32px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .oops-container::before {
            content:''; position: absolute; inset: 0; border-radius: 32px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 140px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(to bottom right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -6px;
            margin-bottom: 24px;
            position: relative;
        }

        h1::after {
            content: '404'; position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom right, var(--accent-glow), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            z-index: -1; filter: blur(30px); opacity: 0.5;
        }

        h2 { font-size: 24px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
        p { font-size: 16px; color: var(--text-dim); line-height: 1.6; margin-bottom: 40px; max-width: 400px; margin-left: auto; margin-right: auto; }

        .btn-home {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: #fff; color: #000; padding: 16px 32px; border-radius: 100px;
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; font-weight: 700; font-size: 15px;
            text-decoration: none; transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(255,255,255,0.15); }
        .btn-home svg { width: 18px; height: 18px; }
        
        @media (max-width: 768px) {
            h1 { font-size: 80px; letter-spacing: -3px; }
            .oops-container { padding: 40px 30px; }
            .core { width: 300px; height: 300px; }
        }
    </style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Biotech Preloader Assets -->
<link rel="stylesheet" href="preloader.css">
<script src="preloader.js" defer></script>
</head>
<body>
    <!-- Biotech Preloader -->
    <div id="rt-preloader">
        <div class="biotech-loader-container">
            <div class="loader-ring"></div>
            <div class="biotech-icons">
                <div class="tube">
                    <div class="tube-liquid"></div>
                </div>
                <div class="pipette">
                    <div class="drop"></div>
                </div>
                <div class="tube">
                    <div class="tube-liquid" style="animation-delay: -1s;"></div>
                </div>
            </div>
        </div>
        <div class="loader-text">Analyzing Bio-Data...</div>
    </div>

<div class="grid-bg"></div>
<div class="core"></div>

<div class="oops-container" data-aos="fade-up" data-aos-duration="1000">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The specific page you are trying to access might have been removed, had its name changed, or is temporarily unavailable.</p>
    
    <a href="index.html" class="btn-home">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        Return to Headquarters
    </a>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });
</script>
</body>
</html>
